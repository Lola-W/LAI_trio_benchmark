root_dir: ".."
chromosome: "22"

# Second config file: controls sample selection and masking behavior.
sample_config: "./snake_samples.yaml"
lai_env_prefix: ""

threads:
  flare: 8
  rfmix: 14

memory_gb:
  flare: 64
  rfmix: 112

# OOM guardrails for child-only benchmark runs on chr22.
# Set rfmix_max_ref_per_pop: 0 and rfmix_ref_min_af: 0 to restore full-panel behavior.
rfmix_max_ref_per_pop: 40
rfmix_ref_min_af: 0.01
